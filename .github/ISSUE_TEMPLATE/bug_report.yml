name: Bug Report
description: Report a bug or issue with Oval
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 26.0 beta 3"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Oval version
      placeholder: "e.g. 1.0"
    validations:
      required: true

  - type: input
    id: chip
    attributes:
      label: Mac chip
      placeholder: "e.g. Apple M1, Apple M4 Pro, Intel i9"

  - type: input
    id: openwebui-version
    attributes:
      label: Open WebUI server version
      placeholder: "e.g. 0.6.42"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem (server config, logs, etc.)
