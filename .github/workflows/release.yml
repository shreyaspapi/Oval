name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-15

    env:
      SCHEME: OpenwebUI
      PROJECT: OpenwebUI/OpenwebUI.xcodeproj
      APP_NAME: Oval
      CODE_SIGN_ID: "Developer ID Application: Shreyas Papinwar (FYS9RNAGTV)"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.8.0
          VERSION="${TAG#v}"                 # e.g. 1.8.0
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm"

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath "$RUNNER_TEMP/Oval.xcarchive" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_ID" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Export signed app
        run: |
          cat > "$RUNNER_TEMP/export-options.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Oval.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/export-options.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Create DMG
        run: |
          DMG_NAME="${APP_NAME}-${{ steps.version.outputs.tag }}.dmg"
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$RUNNER_TEMP/export/Oval.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$RUNNER_TEMP/$DMG_NAME"
          echo "dmg_path=$RUNNER_TEMP/$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME"              >> "$GITHUB_OUTPUT"
        id: dmg

      - name: Notarize
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Use a delimiter for multi-line output
          {
            echo "body<<RELEASE_EOF"
            echo "## What's New in v${VERSION}"
            echo ""
            echo "$NOTES"
            echo ""
            echo "---"
            echo "Signed with Developer ID and notarized by Apple."
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} ${{ steps.version.outputs.tag }}"
          body: ${{ steps.notes.outputs.body }}
          files: ${{ steps.dmg.outputs.dmg_path }}
          fail_on_unmatched_files: true

      - name: Sparkle EdDSA sign DMG
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Get sign_update from Sparkle SPM artifacts
          SIGN_UPDATE=$(find "$RUNNER_TEMP/spm/artifacts/sparkle" -name "sign_update" -type f | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update not found, building from SPM artifacts..."
            SIGN_UPDATE=$(find "$RUNNER_TEMP/spm" -name "sign_update" -type f | head -1)
          fi

          # Sign the DMG
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "${{ steps.dmg.outputs.dmg_path }}" --ed-key-file -)

          # Parse: sparkle:edSignature="..." length="..."
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          DMG_LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | cut -d'"' -f2)

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "dmg_length=$DMG_LENGTH"     >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          ED_SIGNATURE: ${{ steps.sparkle.outputs.ed_signature }}
          DMG_LENGTH: ${{ steps.sparkle.outputs.dmg_length }}
        run: |
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION' "$PROJECT/project.pbxproj" | tr -dc '0-9')
          python3 scripts/update_appcast.py \
            --version "$VERSION" \
            --tag "$TAG" \
            --build "$BUILD" \
            --signature "$ED_SIGNATURE" \
            --length "$DMG_LENGTH" \
            --changelog CHANGELOG.md \
            --appcast appcast.xml

      - name: Push appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add appcast.xml
          git commit -m "Update appcast.xml for ${{ steps.version.outputs.tag }}"
          git push origin main
