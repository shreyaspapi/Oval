name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Create Release
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update marketing version in project
        run: |
          # Update the version in the Xcode project to match the tag
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ steps.version.outputs.VERSION }}/" \
            OpenwebUI/OpenwebUI.xcodeproj/project.pbxproj

      - name: Build app (Release)
        run: |
          xcodebuild \
            -project OpenwebUI/OpenwebUI.xcodeproj \
            -scheme OpenwebUI \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/Oval.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "Oval" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "Oval-v${{ steps.version.outputs.VERSION }}.dmg"

      - name: Generate release notes from CHANGELOG
        id: changelog
        run: |
          # Extract the section for the current version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Get everything between this version header and the next version header
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          
          # Write to file to preserve formatting
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            "Oval-v${{ steps.version.outputs.VERSION }}.dmg" \
            --title "Oval v${{ steps.version.outputs.VERSION }}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
